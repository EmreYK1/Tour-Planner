# Tour Planner: PostgreSQL + Spring Boot + Angular (Nginx)
# Voraussetzung: Docker Desktop (oder Docker Engine + Compose Plugin)
#
# Start:  docker compose up --build
# Stopp: docker compose down
# Datenbank-Daten bleiben im Volume "tour-planner_pgdata" erhalten.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tourplanner
      POSTGRES_USER: tourplanner
      POSTGRES_PASSWORD: tourplanner
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourplanner -d tourplanner"]
      interval: 5s
      timeout: 5s
      retries: 8
    # Port absichtlich nicht nach außen gemappt (vermeidet Konflikte mit lokalem Postgres).
    # Zum Debuggen mit DBeaver o. Ä. optional aktivieren: "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tourplanner
      SPRING_DATASOURCE_USERNAME: tourplanner
      SPRING_DATASOURCE_PASSWORD: tourplanner
      # Keine Flyway-Migrationen im Repo; Schema kommt über init.sql
      SPRING_FLYWAY_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
