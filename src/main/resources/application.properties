# PostgreSQL (Werte an lokale Umgebung anpassen)
spring.datasource.url=jdbc:postgresql://localhost:5432/tourplanner
spring.datasource.username=tourplanner
spring.datasource.password=tourplanner
spring.datasource.driver-class-name=org.postgresql.Driver

# Ohne laufende DB soll der Kontext trotzdem starten (Health-Check); Verbindung wird im Hintergrund versucht
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
# Ohne laufende DB: kein JDBC-Metadaten-Abruf beim Start (bei echten Entities/DDL wieder anpassen)
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
