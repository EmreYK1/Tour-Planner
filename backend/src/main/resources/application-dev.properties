# backend/src/main/resources/application-dev.properties
# Lokales Profil: H2 im Speicher, kein PostgreSQL nötig (voller API-Test mit Frontend).

spring.config.activate.on-profile=dev

spring.datasource.url=jdbc:h2:mem:tourplanner;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# init.sql ist für PostgreSQL gedacht; Schema kommt hier von Hibernate
spring.sql.init.mode=never
