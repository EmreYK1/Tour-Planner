# backend/src/main/resources/application.properties
# Konfiguration: Datenquelle, JPA und Ausführung von init.sql beim Start.
# Lokal ohne Postgres: Profil „dev“ (H2), z. B. mvn spring-boot:run -Dspring-boot.run.profiles=dev

server.port=8080

# PostgreSQL (Werte an lokale Umgebung anpassen)
spring.datasource.url=jdbc:postgresql://localhost:5432/tourplanner
spring.datasource.username=tourplanner
spring.datasource.password=tourplanner
spring.datasource.driver-class-name=org.postgresql.Driver

# Ohne laufende DB soll der Kontext trotzdem starten (Health-Check); Verbindung wird im Hintergrund versucht
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
# init.sql muss vor der JPA-Validierung laufen, damit die Tabelle bereits existiert
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:init.sql

# Flyway ist deaktiviert – Schema-Verwaltung erfolgt über init.sql
spring.flyway.enabled=false
